<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 God View - Multi-Agent Simulation</title>
<style>
:root{--bg-dark:#0a0e27;--bg-card:#1a1f3a;--accent-cyan:#00d4ff;--accent-green:#00ff88;--accent-yellow:#ffd700;--accent-red:#ff4444;--text-primary:#fff;--text-dim:#8892b0;--border:#2d3561}*{margin:0;padding:0;box-sizing:border-box}body{font-family:SF Mono,Monaco,Consolas,monospace;background:var(--bg-dark);color:var(--text-primary);overflow-x:hidden}.container{max-width:1800px;margin:0 auto;padding:1rem}.header{background:linear-gradient(135deg,#1a1f3a 0%,#0a0e27 100%);border:2px solid var(--accent-cyan);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;text-align:center;box-shadow:0 0 30px rgba(0,212,255,.3)}.header h1{font-size:2rem;color:var(--accent-cyan);text-shadow:0 0 20px rgba(0,212,255,.5);margin-bottom:.5rem}.status-badge{display:inline-block;padding:.5rem 1rem;border-radius:20px;font-size:.9rem;margin-top:.5rem}.status-running{background:rgba(0,255,136,.2);border:1px solid var(--accent-green);color:var(--accent-green)}.status-paused{background:rgba(255,215,0,.2);border:1px solid var(--accent-yellow);color:var(--accent-yellow)}.status-stopped{background:rgba(255,68,68,.2);border:1px solid var(--accent-red);color:var(--accent-red)}.controls{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}.button-group{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}button{padding:.75rem 1.5rem;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:inherit}.btn-primary{background:var(--accent-cyan);color:var(--bg-dark)}.btn-primary:hover{box-shadow:0 0 20px rgba(0,212,255,.5);transform:translateY(-2px)}.btn-success{background:var(--accent-green);color:var(--bg-dark)}.btn-warning{background:var(--accent-yellow);color:var(--bg-dark)}.btn-danger{background:var(--accent-red);color:#fff}select,input{padding:.75rem;background:var(--bg-dark);color:var(--text-primary);border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem}select{flex:1;min-width:200px}input{width:100%}.dashboard{display:grid;grid-template-columns:2fr 1fr;gap:1.5rem;margin-bottom:1.5rem}@media (max-width:1024px){.dashboard{grid-template-columns:1fr}}.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1.5rem}.card-title{font-size:1.2rem;color:var(--accent-cyan);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}.agent-card{background:rgba(26,31,58,.6);border:1px solid var(--border);border-radius:8px;padding:1rem;transition:all .3s}.agent-card.active{border-color:var(--accent-green);box-shadow:0 0 15px rgba(0,255,136,.3)}.agent-name{font-size:1.1rem;font-weight:600;color:var(--accent-cyan);margin-bottom:.5rem}.agent-personality{font-size:.85rem;color:var(--text-dim);margin-bottom:.5rem}.agent-status{font-size:.8rem;padding:.25rem .5rem;border-radius:4px;display:inline-block;margin-bottom:.5rem}.agent-status.active{background:rgba(0,255,136,.2);color:var(--accent-green)}.agent-status.idle{background:rgba(136,146,176,.2);color:var(--text-dim)}.agent-action{font-size:.85rem;color:var(--text-primary);margin-top:.5rem;font-style:italic;line-height:1.4}.agent-stats{display:flex;gap:1rem;margin-top:.5rem;font-size:.8rem;color:var(--text-dim)}.event-stream{max-height:600px;overflow-y:auto;padding-right:.5rem}.event-stream::-webkit-scrollbar{width:8px}.event-stream::-webkit-scrollbar-track{background:var(--bg-dark);border-radius:4px}.event-stream::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}.event{padding:.75rem;margin-bottom:.5rem;border-left:3px solid var(--border);background:rgba(26,31,58,.3);border-radius:4px;animation:slideIn .3s ease}.event.god-injection{border-left-color:var(--accent-yellow);background:rgba(255,215,0,.1)}@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}.event-time{font-size:.75rem;color:var(--text-dim);margin-bottom:.25rem}.event-agent{font-weight:600;color:var(--accent-cyan)}.event-description{font-size:.9rem;color:var(--text-primary);line-height:1.5}.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}.stat-item{background:rgba(26,31,58,.6);padding:1rem;border-radius:8px;border:1px solid var(--border)}.stat-label{font-size:.85rem;color:var(--text-dim);margin-bottom:.25rem}.stat-value{font-size:1.5rem;font-weight:600;color:var(--accent-cyan)}.inject-form{display:flex;gap:.5rem;margin-top:1rem}@media (max-width:768px){.header h1{font-size:1.5rem}.button-group{flex-direction:column}button,select{width:100%}.agent-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr}}.loading{text-align:center;padding:2rem;color:var(--text-dim)}.spinner{display:inline-block;width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent-cyan);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem}@keyframes spin{to{transform:rotate(360deg)}}.error-banner{background:rgba(255,68,68,.2);border:1px solid var(--accent-red);color:var(--accent-red);padding:1rem;border-radius:8px;margin-bottom:1rem;text-align:center}
</style>
</head>
<body>
<div class="container">
<div class="error-banner">
⚠️ <strong>API Key Required:</strong> Please enter your Anthropic API key below to start simulations.
</div>
<div class="header">
<h1>🌀 GOD VIEW TERMINAL</h1>
<div id="status-badge" class="status-badge status-stopped">⏸ Stopped · 0 ticks</div>
</div>
<div class="controls">
<div style="margin-bottom:1rem">
<input type="password" id="api-key-input" placeholder="Enter Anthropic API Key (sk-ant-...)" style="margin-bottom:0.5rem">
<button class="btn-success" onclick="saveApiKey()">💾 Save API Key</button>
</div>
<div class="button-group">
<select id="scenario-select"><option value="">Select Scenario...</option></select>
<button class="btn-primary" onclick="startScenario()">🚀 Start</button>
<button class="btn-warning" onclick="pauseSimulation()">⏸ Pause</button>
<button class="btn-success" onclick="resumeSimulation()">▶️ Resume</button>
<button class="btn-danger" onclick="resetSimulation()">🔄 Reset</button>
<button class="btn-primary" onclick="exportData()">📥 Export</button>
</div>
<div class="inject-form">
<input type="text" id="inject-input" placeholder="Inject event (e.g., 'Breaking news: Market crash')">
<button class="btn-warning" onclick="injectEvent()">💉 Inject</button>
</div>
</div>
<div class="dashboard">
<div class="card">
<div class="card-title">🤖 Agent Swarm</div>
<div id="agent-grid" class="agent-grid"><div class="loading"><div class="spinner"></div><div>Select a scenario...</div></div></div>
</div>
<div class="card">
<div class="card-title">📊 Statistics</div>
<div class="stats-grid">
<div class="stat-item"><div class="stat-label">Total Agents</div><div class="stat-value" id="stat-agents">0</div></div>
<div class="stat-item"><div class="stat-label">Active Now</div><div class="stat-value" id="stat-active">0</div></div>
<div class="stat-item"><div class="stat-label">Total Events</div><div class="stat-value" id="stat-events">0</div></div>
<div class="stat-item"><div class="stat-label">Tick Rate</div><div class="stat-value">3.0s</div></div>
</div>
</div>
</div>
<div class="card">
<div class="card-title">📡 Event Stream</div>
<div id="event-stream" class="event-stream"><div class="loading"><div>No events yet...</div></div></div>
</div>
</div>
<script>
const SCENARIOS=[{id:'market_prediction',name:'Market Prediction',description:'Predict market movements',initial_agents:[{name:'Bull',personality:'optimistic'},{name:'Bear',personality:'skeptical'},{name:'Quant',personality:'analytical'},{name:'Trader',personality:'bold'}]},{id:'product_launch',name:'Product Launch',description:'Customer reactions to products',initial_agents:[{name:'Early Adopter',personality:'bold'},{name:'Critic',personality:'skeptical'},{name:'Influencer',personality:'creative'},{name:'Researcher',personality:'analytical'}]},{id:'policy_impact',name:'Policy Impact',description:'Policy change effects',initial_agents:[{name:'Policymaker',personality:'pragmatic'},{name:'Citizen',personality:'empathetic'},{name:'Economist',personality:'analytical'},{name:'Activist',personality:'bold'}]},{id:'swarm_exploration',name:'Free Exploration',description:'Agents interact freely',initial_agents:[{name:'Alice',personality:'creative'},{name:'Bob',personality:'analytical'},{name:'Charlie',personality:'empathetic'},{name:'Diana',personality:'bold'},{name:'Eve',personality:'skeptical'},{name:'Frank',personality:'optimistic'}]}];const PERSONALITIES={analytical:'You are analytical and data-driven.',creative:'You are creative and imaginative.',skeptical:'You are skeptical and questioning.',optimistic:'You are optimistic and hopeful.',cautious:'You are cautious and risk-averse.',bold:'You are bold and decisive.',empathetic:'You are empathetic and people-focused.',pragmatic:'You are pragmatic and practical.'};let state={agents:[],events:[],tick:0,running:!1,scenario:null},apiKey='',tickTimer=null;function saveApiKey(){const key=document.getElementById('api-key-input').value.trim();if(!key.startsWith('sk-ant-'))return alert('Invalid API key format');apiKey=key;localStorage.setItem('anthropic_api_key',key);document.querySelector('.error-banner').style.display='none';alert('✓ API key saved!')}function loadScenarios(){const select=document.getElementById('scenario-select');SCENARIOS.forEach(s=>{const opt=document.createElement('option');opt.value=s.id;opt.textContent=`${s.name} - ${s.description}`;select.appendChild(opt)})}async function startScenario(){if(!apiKey){apiKey=localStorage.getItem('anthropic_api_key');if(!apiKey)return alert('Please enter API key first')}const scenarioId=document.getElementById('scenario-select').value;if(!scenarioId)return alert('Select a scenario');const scenario=SCENARIOS.find(s=>s.id===scenarioId);state.agents=[];state.events=[];state.tick=0;state.scenario=scenario;scenario.initial_agents.forEach((a,i)=>{state.agents.push({id:i,name:a.name,personality:a.personality,status:'initializing',last_action:'',memory:[],interactions:0})});state.running=!0;scheduleTick();updateUI()}function pauseSimulation(){state.running=!1;if(tickTimer){clearTimeout(tickTimer);tickTimer=null}updateUI()}function resumeSimulation(){state.running=!0;scheduleTick();updateUI()}function resetSimulation(){if(!confirm('Reset?'))return;state.agents=[];state.events=[];state.tick=0;state.running=!1;state.scenario=null;if(tickTimer){clearTimeout(tickTimer);tickTimer=null}updateUI()}function exportData(){const blob=new Blob([JSON.stringify({export_time:new Date().toISOString(),scenario:state.scenario,total_ticks:state.tick,agents:state.agents,events:state.events},null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`god-view-${Date.now()}.json`;a.click()}function injectEvent(){const input=document.getElementById('inject-input'),event=input.value.trim();if(!event)return;state.events.push({timestamp:new Date().toISOString(),agent_id:-1,agent_name:'GOD',event_type:'injection',description:`🌀 GOD INTERVENTION: ${event}`});input.value='';updateUI()}function scheduleTick(){if(!state.running)return;tickTimer=setTimeout(runTick,3e3)}async function runTick(){if(!state.running||state.agents.length===0)return;state.tick++;const count=Math.min(3,Math.max(2,state.agents.length)),activeAgents=state.agents.sort(()=>Math.random()-.5).slice(0,count);await Promise.all(activeAgents.map(a=>agentThink(a)));state.agents.forEach(a=>{if(!activeAgents.includes(a))a.status='idle'});updateUI();scheduleTick()}async function agentThink(agent){const context=state.events.slice(-5).map(e=>`${e.agent_name}: ${e.description}`).join('\n'),systemPrompt=`You are ${agent.name}, a ${agent.personality} AI agent.\n\nRecent events:\n${context||'Simulation just started.'}\n\nYour memories:\n${agent.memory.slice(-5).join('\n')||'None yet.'}\n\nRespond with ONE action (1-2 sentences).`;try{const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-3-5-haiku-20241022',max_tokens:150,temperature:.8,system:systemPrompt,messages:[{role:'user',content:'What do you do next?'}]})}),data=await response.json(),action=data.content?.[0]?.text||`reflecting with ${agent.personality} perspective`;agent.status='active';agent.last_action=action;agent.memory.push(action);agent.interactions++;state.events.push({timestamp:new Date().toISOString(),agent_id:agent.id,agent_name:agent.name,event_type:'action',description:action});if(agent.memory.length>20)agent.memory=agent.memory.slice(-20);if(state.events.length>100)state.events=state.events.slice(-100)}catch(error){console.error('Agent error:',error);agent.last_action=`error: ${error.message}`}}function updateUI(){renderAgents();renderEvents();renderStats();renderStatus()}function renderAgents(){const c=document.getElementById('agent-grid');if(state.agents.length===0)return c.innerHTML='<div class="loading"><div>No agents...</div></div>';c.innerHTML=state.agents.map(a=>`<div class="agent-card ${a.status==='active'?'active':''}"><div class="agent-name">${a.name}</div><div class="agent-personality">${a.personality}</div><div class="agent-status ${a.status}">${a.status}</div><div class="agent-action">"${a.last_action||'Waiting...'}"</div><div class="agent-stats"><span>💭 ${a.memory.length}</span><span>🔄 ${a.interactions}</span></div></div>`).join('')}function renderEvents(){const c=document.getElementById('event-stream');if(state.events.length===0)return c.innerHTML='<div class="loading"><div>No events...</div></div>';c.innerHTML=state.events.slice().reverse().map(e=>{const time=new Date(e.timestamp).toLocaleTimeString(),isGod=e.agent_name==='GOD';return`<div class="event ${isGod?'god-injection':''}"><div class="event-time">${time}</div><div class="event-description"><span class="event-agent">${e.agent_name}:</span> ${e.description}</div></div>`}).join('');c.scrollTop=0}function renderStats(){document.getElementById('stat-agents').textContent=state.agents.length;document.getElementById('stat-active').textContent=state.agents.filter(a=>a.status==='active').length;document.getElementById('stat-events').textContent=state.events.length}function renderStatus(){const badge=document.getElementById('status-badge');if(state.running){badge.className='status-badge status-running';badge.textContent=`● Running · ${state.tick} ticks`}else if(state.tick>0){badge.className='status-badge status-paused';badge.textContent=`⏸ Paused · ${state.tick} ticks`}else{badge.className='status-badge status-stopped';badge.textContent='⏹ Stopped · 0 ticks'}}loadScenarios();const savedKey=localStorage.getItem('anthropic_api_key');if(savedKey){apiKey=savedKey;document.getElementById('api-key-input').value=savedKey;document.querySelector('.error-banner').style.display='none'}
</script>
</body>
</html>
